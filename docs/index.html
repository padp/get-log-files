<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UACJ Paducah Log Load Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <nav class="mobile-nav">
      <button data-panel="list" class="active">List</button>
      <button data-panel="dashboard">Dashboard</button>
      <button data-panel="campaigns">Campaigns</button>
    </nav>

    <div id="left" class="active-panel">
      <input type="text" id="search" placeholder="Search..." />
      <div id="keyList"></div>
    </div>

    <div id="right">
      <div class="metric-card">
        <h2 id="shiftCount">Logs This Shift: 0</h2>
      </div>

      <div class="metric-card">
        <h3>Log Details</h3>
        <div id="recentLogs"></div>
      </div>

      <div class="metric-card">
        <h3>Selected Record</h3>
        <div id="recordSummary">Select a record...</div>
      </div>

      <details>
        <summary>Raw JSON</summary>
        <pre id="rawJson"></pre>
      </details>
    </div>

    <div id="rightmost">
      <div class="metric-card">
        <h3>Alloy Change History</h3>

        <select id="campaignSelect"></select>

        <div id="campaignSummary"></div>

        <div id="campaignLogs"></div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
