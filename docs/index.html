<div id="right">

    <div class="tabs">
        <button class="tab active" data-tab="dashboard">
            Dashboard
        </button>

        <button class="tab" data-tab="campaigns">
            Campaigns
        </button>
    </div>

    <div id="dashboardTab" class="tab-content active">

        <div class="metric-card">
            <h2 id="shiftCount"></h2>
        </div>

        <div class="metric-card">
            <h3>Log Details</h3>
            <div id="recentLogs"></div>
        </div>

        <div class="metric-card">
            <h3>Selected Record</h3>
            <div id="recordSummary"></div>
        </div>

    </div>

    <div id="campaignTab" class="tab-content">

        <div class="metric-card">

            <h3>Campaign History</h3>

            <select id="campaignSelect"></select>

            <div id="campaignSummary"></div>

            <div id="campaignLogs"></div>

        </div>

    </div>

</div>
